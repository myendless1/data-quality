<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>推荐采样点</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --panel: #1d2328;
      --line: #343c45;
      --text: #f4f7f8;
      --muted: #a8b3bd;
      --grasp: #2aa8ff;
      --place: #ffb23f;
      --candidate: #63e58c;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .task-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .task-header .task-label {
      color: var(--muted);
      font-size: 24px;
      font-weight: 600;
    }
    .task-header .task-name {
      color: var(--text);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .boards {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(520px, 3.4fr) minmax(260px, 1fr);
      gap: 14px;
      padding: 14px;
      width: 100%;
      height: 100%;
    }
    .board {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }
    .board.distribution {
      grid-template-rows: none;
      align-content: start;
    }
    .title {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 18px;
    }
    .title strong {
      color: var(--text);
      font-size: 28px;
      line-height: 1.2;
    }
    #recommendMeta {
      font-size: 28px;
      font-weight: 700;
      color: #2aa8ff;
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      align-self: stretch;
      border: 1px solid var(--line);
      background: #050607;
      overflow: hidden;
    }
    .board.distribution .canvas-wrap {
      height: auto;
      aspect-ratio: 16 / 9;
      align-self: start;
    }
    .live-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: none;
    }
    .live-background.ready {
      display: block;
    }
    .board.distribution .title {
      align-items: flex-start;
      flex-direction: column;
      justify-content: flex-start;
      gap: 4px;
    }
    .board.distribution .title strong {
      font-size: 28px;
      line-height: 1.08;
    }
    .board.distribution #mainMeta {
      display: grid;
      gap: 2px;
      width: 100%;
      color: #c6d2dd;
      font-size: 18px;
      line-height: 1.25;
    }
    .board.distribution #mainMeta span {
      display: block;
      overflow-wrap: anywhere;
    }
    .last-collection {
      border: 1px solid #ff3b3b;
      border-radius: 6px;
      background: rgba(28, 14, 16, 0.55);
      padding: 12px 14px;
      color: var(--text);
      font-size: 20px;
      line-height: 1.42;
      min-height: 110px;
      width: 100%;
      overflow-wrap: anywhere;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .last-collection .lc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
    }
    .last-collection .lc-badge {
      display: inline-block;
      padding: 2px 12px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .last-collection.ok .lc-badge { background: #1f6f43; color: #d8ffd8; }
    .last-collection.fail .lc-badge { background: #7a1f1f; color: #ffd2d2; }
    .last-collection.warn { border-color: #e0a93b; }
    .last-collection.warn.ok .lc-badge { background: #7a5b1f; color: #ffe9b8; }
    .last-collection .lc-warn {
      color: #ffd98a;
      font-size: 18px;
      white-space: pre-wrap;
      border-left: 3px solid #e0a93b;
      padding: 5px 10px;
      background: rgba(122, 91, 31, 0.18);
      border-radius: 3px;
    }
    .last-collection .lc-reason {
      color: #d6dde3;
      font-size: 18px;
      white-space: pre-wrap;
    }
    .last-collection .lc-meta {
      color: var(--muted);
      font-size: 16px;
    }
    .last-collection .lc-empty {
      color: var(--muted);
      font-size: 18px;
    }
    .review-image-wrap {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #050607;
      overflow: hidden;
    }
    .review-image-wrap[hidden] { display: none; }
    .review-image-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
    .review-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      border: 1px solid #ff3b3b;
      border-radius: 6px;
      background: rgba(40, 18, 20, 0.55);
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.35;
    }
    .review-bar[hidden] { display: none; }
    .review-bar .review-title {
      font-weight: 700;
      color: #ffd2d2;
      white-space: nowrap;
    }
    .review-bar .review-reasons {
      flex: 1 1 220px;
      color: #d6dde3;
      overflow-wrap: anywhere;
    }
    .review-bar .review-actions {
      display: inline-flex;
      gap: 8px;
    }
    .review-bar button {
      height: 32px;
      padding: 0 12px;
      font-size: 13px;
    }
    .review-bar #reviewKeepBtn {
      background: #2a3138;
      border-color: var(--line);
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .controls {
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    select, input, button {
      height: 38px;
      border: 1px solid var(--line);
      background: #2a3138;
      color: var(--text);
      border-radius: 6px;
      padding: 0 12px;
      font-weight: 650;
      font-size: 14px;
    }
    input {
      width: 92px;
    }
    button {
      background: #1766d1;
      border-color: #2f80ed;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .pill {
      color: var(--muted);
      font-size: 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      max-width: min(720px, 100%);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .legend {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 76px;
      transform: translateX(-50%) translateY(18px);
      max-width: min(680px, calc(100vw - 28px));
      border: 1px solid rgba(255, 107, 107, 0.65);
      background: rgba(44, 22, 24, 0.96);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.36);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 20;
      font-size: 14px;
      line-height: 1.42;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast strong {
      display: block;
      margin-bottom: 4px;
      color: #ffd2d2;
      font-size: 15px;
    }
    @media (max-width: 980px) {
      .boards { grid-template-columns: 1fr; }
      .title { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="task-header">
      <span class="task-label">当前任务：</span><span class="task-name" id="taskName">Centrifuge</span>
    </header>
    <section class="boards">
      <div class="board recommendation">
        <div class="title">
          <strong>推荐窗口</strong>
          <span id="recommendMeta"></span>
        </div>
        <div class="canvas-wrap">
          <img id="recommendLiveBackground" class="live-background" alt="">
          <canvas id="recommendCanvas" width="1280" height="720"></canvas>
        </div>
        <div class="review-bar" id="reviewBar" hidden>
          <span class="review-title">采集未通过·待复核</span>
          <span class="review-reasons" id="reviewReasons"></span>
          <span class="review-actions">
            <button id="reviewDeleteBtn" type="button">删除文件</button>
            <button id="reviewKeepBtn" type="button">保留</button>
          </span>
        </div>
      </div>
      <div class="board distribution">
        <div class="title">
          <strong>总体分布</strong>
          <span id="mainMeta"></span>
        </div>
        <div class="canvas-wrap"><canvas id="mainCanvas" width="1280" height="720"></canvas></div>
        <div class="last-collection" id="lastCollection" aria-live="polite">
          <span class="lc-empty">等待上一次采集结果…</span>
        </div>
        <div class="review-image-wrap" id="reviewImageWrap" hidden>
          <img id="reviewImage" alt="采集关键帧与bbox叠加图">
        </div>
      </div>
    </section>
    <section class="controls">
      <select id="taskSelect" aria-label="任务">
        <option value="centrifuge">离心机</option>
        <option value="multidrop">分液器</option>
      </select>
      <button id="sampleBtn">下一条</button>
      <span class="legend"><span class="dot" style="background: var(--grasp)"></span>抓</span>
      <span class="legend"><span class="dot" style="background: var(--place)"></span>放</span>
      <span class="pill" id="status">加载中</span>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const mainCanvas = document.getElementById('mainCanvas');
    const recommendCanvas = document.getElementById('recommendCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const recommendCtx = recommendCanvas.getContext('2d');
    const recommendLiveBackground = document.getElementById('recommendLiveBackground');
    const mainMeta = document.getElementById('mainMeta');
    const recommendMeta = document.getElementById('recommendMeta');
    const statusEl = document.getElementById('status');
    const toastEl = document.getElementById('toast');
    const taskSelect = document.getElementById('taskSelect');
    const taskNameEl = document.getElementById('taskName');
    const lastCollectionEl = document.getElementById('lastCollection');
    const reviewImageWrap = document.getElementById('reviewImageWrap');
    const reviewImage = document.getElementById('reviewImage');
    const colors = { grasp: '#2aa8ff', place: '#ffb23f' };
    const candidateColors = { grasp: '#6ae6ff', place: '#ffe07a' };
    const taskLabels = { centrifuge: '离心机', multidrop: '分液器' };
    const taskNameEn = { centrifuge: 'Centrifuge', multidrop: 'Multidrop' };
    const keyposeLabels = { grasp: '抓', place: '放' };
    const rejectLabels = {
      overlap: '重叠',
      blocked: '路径遮挡',
      box: '框越界',
      direction: '方向不符',
      grasp_ik: '抓IK失败',
      place_ik: '放IK失败'
    };
    let background = new Image();
    let mainPayload = null;
    let recommendPayload = null;
    let mainSeq = 0;
    let recommendSeq = 0;
    let mainController = null;
    let recommendController = null;
    let mainCount = 100;
    let lastCollectionEventId = 0;
    let lastCollectionRecord = null;
    let pendingReview = null;
    let collectionPollTimer = null;
    let toastTimer = null;
    let recommendLiveReady = false;

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? 'var(--danger)' : 'var(--muted)';
    }

    function showToast(title, lines) {
      if (toastTimer) clearTimeout(toastTimer);
      const body = Array.isArray(lines)
        ? lines.filter(Boolean).map(escapeHtml).join('<br>')
        : escapeHtml(lines || '');
      toastEl.innerHTML = `<strong>${escapeHtml(title)}</strong>${body}`;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 5000);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function taskLabel(task) {
      return taskLabels[task] || task || '未知任务';
    }

    function updateTaskName(task) {
      taskNameEl.textContent = taskNameEn[task] || (task || 'unknown');
    }

    function keyposeLabel(keypose) {
      return keyposeLabels[keypose] || keypose || '未知姿态';
    }

    function translateVisibleText(value) {
      return String(value || '')
        .replaceAll('grasp_ik', '抓IK失败')
        .replaceAll('place_ik', '放IK失败')
        .replaceAll('graspIK', '抓IK失败')
        .replaceAll('placeIK', '放IK失败')
        .replaceAll('grasp', '抓')
        .replaceAll('place', '放')
        .replaceAll('centrifuge', '离心机')
        .replaceAll('multidrop', '分液器')
        .replaceAll('overlap', '重叠')
        .replaceAll('blocked', '路径遮挡')
        .replaceAll('projection', '投影失败')
        .replaceAll('direction', '方向不符')
        .replaceAll('box', '框越界')
        .replaceAll('filling', '生成中')
        .replaceAll('pairs', '样本')
        .replaceAll('workspace', '工作区')
        .replaceAll('cache ignored: configuration changed', '缓存已忽略：配置已变化')
        .replaceAll('cache load failed', '缓存加载失败')
        .replaceAll('cache save failed', '缓存保存失败')
        .replaceAll('no candidates available', '没有可用候选点');
    }

    function errorText(err) {
      const raw = err?.message || String(err || '');
      return translateVisibleText(raw.replace(/^Error:\s*/, '')) || '未知错误';
    }

    function drawBackground(ctx) {
      ctx.clearRect(0, 0, 1280, 720);
      if (background.complete) ctx.drawImage(background, 0, 0, 1280, 720);
    }

    function clearRecommendationCanvas(ctx) {
      ctx.clearRect(0, 0, 1280, 720);
      if (!recommendLiveReady && background.complete) {
        ctx.drawImage(background, 0, 0, 1280, 720);
      }
    }

    function drawArrowHead(ctx, fromX, fromY, toX, toY, size) {
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - size * Math.cos(angle - Math.PI / 6), toY - size * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(toX - size * Math.cos(angle + Math.PI / 6), toY - size * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawPoint(ctx, point, alpha = 0.72) {
      const color = colors[point.keypose] || '#ffffff';
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(point.x, point.y, 3.2, 0, Math.PI * 2);
      ctx.fill();
      if (Number.isFinite(point.direction_u) && Number.isFinite(point.direction_v)) {
        const norm = Math.hypot(point.direction_u, point.direction_v);
        if (norm > 1e-6) {
          const scale = 24 / norm;
          const ex = point.x + point.direction_u * scale;
          const ey = point.y + point.direction_v * scale;
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(point.x, point.y);
          ctx.lineTo(ex, ey);
          ctx.stroke();
          drawArrowHead(ctx, point.x, point.y, ex, ey, 5);
        }
      }
      ctx.restore();
    }

    function drawHull(ctx, hull, color) {
      if (!hull || hull.length < 3) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.setLineDash([9, 7]);
      ctx.beginPath();
      hull.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function drawCandidate(ctx, sample) {
      if (!sample || sample.error || !sample.candidate) return;
      const c = sample.candidate;
      const color = candidateColors[sample.keypose] || '#63e58c';
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(c.x - 28, c.y);
      ctx.lineTo(c.x + 28, c.y);
      ctx.moveTo(c.x, c.y - 28);
      ctx.lineTo(c.x, c.y + 28);
      ctx.stroke();
      ctx.font = '700 24px system-ui';
      ctx.textBaseline = 'bottom';
      ctx.fillText(keyposeLabel(sample.keypose), Math.min(c.x + 18, 1190), Math.max(c.y - 14, 32));
      ctx.restore();
    }

    function drawBatchPose(ctx, pose, color, label, options = {}) {
      const drawBox = options.drawBox || false;
      const labelFont = options.labelFont || '700 11px system-ui';
      const labelOffsetX = options.labelOffsetX ?? 7;
      const labelOffsetY = options.labelOffsetY ?? -7;
      const box = pose.box_px || pose.box;
      ctx.save();
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      if (drawBox && Array.isArray(box) && box.length >= 4) {
        ctx.lineWidth = 6;
        ctx.beginPath();
        box.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
        ctx.closePath();
        ctx.globalAlpha *= 0.16;
        ctx.fill();
        ctx.globalAlpha /= 0.16;
        ctx.stroke();
        const centerX = box.reduce((sum, p) => sum + p[0], 0) / box.length;
        const centerY = box.reduce((sum, p) => sum + p[1], 0) / box.length;
        const frontX = (box[0][0] + box[1][0]) / 2;
        const frontY = (box[0][1] + box[1][1]) / 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'rgba(11,15,18,0.82)';
        ctx.fillStyle = 'rgba(11,15,18,0.82)';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(frontX, frontY);
        ctx.stroke();
        drawArrowHead(ctx, centerX, centerY, frontX, frontY, 11);
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(frontX, frontY);
        ctx.stroke();
        drawArrowHead(ctx, centerX, centerY, frontX, frontY, 8);
      } else {
        ctx.beginPath();
        ctx.arc(pose.x, pose.y, 5.5, 0, Math.PI * 2);
        ctx.fill();
      }
      if (!drawBox && Number.isFinite(pose.direction_u) && Number.isFinite(pose.direction_v)) {
        const norm = Math.hypot(pose.direction_u, pose.direction_v);
        if (norm > 1e-6) {
          const scale = 22 / norm;
          const ex = pose.x + pose.direction_u * scale;
          const ey = pose.y + pose.direction_v * scale;
          ctx.beginPath();
          ctx.moveTo(pose.x, pose.y);
          ctx.lineTo(ex, ey);
          ctx.stroke();
          drawArrowHead(ctx, pose.x, pose.y, ex, ey, 4.5);
        }
      }
      if (label) {
        ctx.font = labelFont;
        ctx.textBaseline = 'middle';
        ctx.fillText(label, pose.x + labelOffsetX, pose.y + labelOffsetY);
      }
      ctx.restore();
    }

    function drawBatchPairs(ctx, data, showLabels = false, alpha = 0.2) {
      const pairs = data?.batch?.pairs || [];
      ctx.save();
      for (const pair of pairs) {
        const collected = !!pair.collected;
        ctx.globalAlpha = collected ? 1.0 : alpha;
        const label = showLabels && pairs.length <= 120 ? String(pair.index + 1) : '';
        drawBatchPose(ctx, pair.grasp, candidateColors.grasp, label);
        drawBatchPose(ctx, pair.place, candidateColors.place, '');
      }
      ctx.restore();
    }

    function drawCandidateCloud(ctx, sample, alpha = 0.2) {
      if (!sample || sample.error) return;
      const color = candidateColors[sample.keypose] || '#63e58c';
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      for (const item of sample.top_candidates || []) {
        ctx.beginPath();
        ctx.arc(item.x, item.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPayloadView(ctx, metaEl, data, showLabels = false, distributionAlpha = 0.2) {
      drawBackground(ctx);
      const task = data?.task || taskSelect.value;
      const samples = data?.samples || {};
      for (const keypose of ['grasp', 'place']) {
        const group = data?.groups?.[`${task}:${keypose}`];
        drawHull(ctx, group?.hull, keypose === 'grasp' ? 'rgba(42,168,255,0.2)' : 'rgba(255,178,63,0.2)');
        drawCandidateCloud(ctx, samples[keypose], distributionAlpha);
      }
      drawBatchPairs(ctx, data, showLabels, distributionAlpha);
      drawCandidate(ctx, samples.grasp);
      drawCandidate(ctx, samples.place);

      const labels = [];
      const batch = data?.batch;
      if (batch) labels.push(`样本 ${batch.count}/${batch.requested}`);
      metaEl.innerHTML = labels.map(label => `<span>${escapeHtml(label)}</span>`).join('');
    }

    function renderMain() {
      if (!mainPayload) return;
      drawPayloadView(mainCtx, mainMeta, mainPayload, false, 0.2);
    }

    function renderRecommend() {
      if (!recommendPayload) return;
      drawRecommendationView(recommendCtx, recommendMeta, recommendPayload);
    }

    function drawRecommendationView(ctx, metaEl, data) {
      clearRecommendationCanvas(ctx);
      const pair = data?.batch?.pairs?.[0];
      if (!pair) {
        metaEl.textContent = '无可用推荐';
        return;
      }
      ctx.save();
      ctx.globalAlpha = 0.95;
      const recommendationLabelOptions = {
        drawBox: true,
        labelFont: '800 30px system-ui',
        labelOffsetX: 18,
        labelOffsetY: -18
      };
      drawBatchPose(ctx, pair.grasp, candidateColors.grasp, '抓', recommendationLabelOptions);
      drawBatchPose(ctx, pair.place, candidateColors.place, '放', recommendationLabelOptions);
      ctx.restore();

      const batch = data.batch || {};
      let metaText = '';
      if (Number.isFinite(batch.uncollected_count)) {
        metaText = `未采集剩余 ${batch.uncollected_count}`;
      }
      metaEl.textContent = metaText;
      drawReviewOverlay(ctx);
    }

    const reviewColors = { grasp: '#ff4d6d', place: '#ff8a3b' };
    const reviewLabels = { grasp: '实测抓', place: '实测放' };

    function drawReviewOverlay(ctx) {
      const overlay = pendingReview && pendingReview.overlay;
      if (!overlay) return;
      const options = {
        drawBox: true,
        labelFont: '800 26px system-ui',
        labelOffsetX: 16,
        labelOffsetY: -16
      };
      ctx.save();
      ctx.globalAlpha = 0.96;
      for (const keypose of ['grasp', 'place']) {
        const actual = overlay[`actual_${keypose}`];
        if (actual) {
          drawBatchPose(ctx, actual, reviewColors[keypose], reviewLabels[keypose], options);
        }
      }
      ctx.restore();
    }

    function setPendingReview(event) {
      pendingReview = {
        file: event.file || '',
        task: event.task,
        pair_index: event.pair_index,
        reasons: Array.isArray(event.reasons) ? event.reasons.map(translateVisibleText) : [],
        overlay: event.overlay || null,
        time: event.time,
      };
      renderReviewBar();
      renderRecommend();
    }

    function clearPendingReview() {
      pendingReview = null;
      renderReviewBar();
      renderRecommend();
    }

    function renderReviewBar() {
      const bar = document.getElementById('reviewBar');
      const reasonsEl = document.getElementById('reviewReasons');
      if (!pendingReview) {
        bar.hidden = true;
        return;
      }
      bar.hidden = false;
      reasonsEl.textContent = pendingReview.reasons.length
        ? pendingReview.reasons.join('；')
        : '采集未通过校验';
    }

    async function deletePendingReviewFile() {
      if (!pendingReview || !pendingReview.file) {
        clearPendingReview();
        return;
      }
      const btn = document.getElementById('reviewDeleteBtn');
      btn.disabled = true;
      btn.textContent = '删除中…';
      try {
        const params = new URLSearchParams({ file: pendingReview.file, t: Date.now().toString() });
        const res = await fetch(`/api/collection-delete?${params.toString()}`);
        const data = await res.json();
        if (!data.ok) {
          setStatus(`删除失败：${translateVisibleText(data.error) || '未知错误'}`, true);
          showToast('删除失败', [translateVisibleText(data.error) || '未知错误']);
          return;
        }
        setStatus('已删除采集文件，可继续采集下一条');
        showToast('已删除', [pendingReview.file.split('/').pop() || '']);
      } catch (err) {
        setStatus(`删除请求失败：${errorText(err)}`, true);
        showToast('删除请求失败', [errorText(err)]);
        return;
      } finally {
        btn.disabled = false;
        btn.textContent = '删除文件';
      }
      clearPendingReview();
    }

    async function keepPendingReviewFile() {
      if (!pendingReview || !pendingReview.file) {
        clearPendingReview();
        return;
      }
      const btn = document.getElementById('reviewKeepBtn');
      btn.disabled = true;
      btn.textContent = '处理中…';
      try {
        const params = new URLSearchParams({ file: pendingReview.file, t: Date.now().toString() });
        const res = await fetch(`/api/collection-keep?${params.toString()}`);
        const data = await res.json();
        if (!data.ok) {
          setStatus(`保留失败：${translateVisibleText(data.error) || '未知错误'}`, true);
          showToast('保留失败', [translateVisibleText(data.error) || '未知错误']);
          return;
        }
        setStatus('已保留采集文件，继续下一条');
      } catch (err) {
        setStatus(`保留请求失败：${errorText(err)}`, true);
        showToast('保留请求失败', [errorText(err)]);
        return;
      } finally {
        btn.disabled = false;
        btn.textContent = '保留';
      }
      clearPendingReview();
    }

    async function fetchPayload(task, count, controller) {
      const params = new URLSearchParams({
        task,
        count,
        t: Date.now().toString()
      });
      const res = await fetch(`/api/data?${params.toString()}`, { signal: controller.signal });
      if (!res.ok) throw new Error(`请求失败 ${res.status}`);
      return await res.json();
    }

    async function fetchRecommendation(task, advance, controller) {
      const params = new URLSearchParams({
        task,
        advance: advance ? '1' : '0',
        t: Date.now().toString()
      });
      const res = await fetch(`/api/recommend?${params.toString()}`, { signal: controller.signal });
      if (!res.ok) throw new Error(`请求失败 ${res.status}`);
      return await res.json();
    }

    async function fetchCollectionEvents() {
      const params = new URLSearchParams({
        after: String(lastCollectionEventId),
        t: Date.now().toString()
      });
      const res = await fetch(`/api/collection-events?${params.toString()}`);
      if (!res.ok) throw new Error(`请求失败 ${res.status}`);
      return await res.json();
    }

    async function pollCollectionEvents() {
      try {
        const payload = await fetchCollectionEvents();
        if (Number.isFinite(payload.last_event_id)) {
          lastCollectionEventId = Math.max(lastCollectionEventId, payload.last_event_id);
        }
        for (const event of payload.events || []) {
          await handleCollectionEvent(event);
        }
        if (payload.error) {
          setStatus(`采集目录扫描警告：${translateVisibleText(payload.error)}`, true);
        }
      } catch (err) {
        setStatus(`采集事件轮询失败：${errorText(err)}`, true);
      }
    }

    function renderLastCollection() {
      const el = lastCollectionEl;
      const record = lastCollectionRecord;
      el.classList.remove('ok', 'fail', 'warn');
      if (!record) {
        el.innerHTML = '<span class="lc-empty">等待上一次采集结果…</span>';
        return;
      }
      const ok = record.status === 'accepted';
      const warnings = Array.isArray(record.warnings)
        ? record.warnings.map(translateVisibleText).filter(Boolean)
        : [];
      el.classList.add(ok ? 'ok' : 'fail');
      if (warnings.length) el.classList.add('warn');
      const badge = ok ? (warnings.length ? '成功(警告)' : '成功') : '失败';
      const pairLabel = Number.isFinite(record.pair_index) ? `样本 #${record.pair_index + 1}` : '';
      const taskName = taskLabel(record.task);
      const timeStr = Number.isFinite(record.time)
        ? new Date(record.time * 1000).toLocaleTimeString()
        : '';
      let reasonText = '';
      if (!ok) {
        const reasons = Array.isArray(record.reasons) && record.reasons.length
          ? record.reasons.map(translateVisibleText)
          : [translateVisibleText(record.message) || '采集文件未通过校验'];
        reasonText = reasons.join('；');
      } else {
        reasonText = translateVisibleText(record.message) || '采集有效，已匹配并完成采样点';
      }
      const metaParts = [taskName, pairLabel, timeStr].filter(Boolean);
      const warnHtml = warnings.length
        ? `<div class="lc-warn">${warnings.map(escapeHtml).join('<br>')}</div>`
        : '';
      el.innerHTML =
        `<div class="lc-header"><span class="lc-badge">${badge}</span>${
          pairLabel ? `<span>${escapeHtml(pairLabel)}</span>` : ''
        }</div>` +
        `<div class="lc-reason">${escapeHtml(reasonText)}</div>` +
        warnHtml +
        (metaParts.length ? `<div class="lc-meta">${escapeHtml(metaParts.join(' · '))}</div>` : '');
    }

    async function handleCollectionEvent(event) {
      if (!event || !event.status) return;
      if (event.status === 'deduped') {
        const file = (event.file || '').split('/').pop() || '';
        showToast('重复采集已去重', [translateVisibleText(event.message) || `已删除重复文件 ${file}`]);
        return;
      }
      lastCollectionRecord = {
        status: event.status,
        task: event.task,
        pair_index: event.pair_index,
        message: event.message,
        reasons: event.reasons,
        warnings: event.warnings,
        deleted: event.deleted,
        time: event.time,
        file: event.file,
      };
      renderLastCollection();
      if (event.review_image) {
        reviewImage.src = `/api/review-image?file=${encodeURIComponent(event.review_image)}&t=${Date.now()}`;
        reviewImageWrap.hidden = false;
      } else if (event.status !== 'pending') {
        reviewImageWrap.hidden = true;
        reviewImage.removeAttribute('src');
      }
      if (event.status === 'accepted') {
        clearPendingReview();
        const label = Number.isFinite(event.pair_index) ? ` #${event.pair_index + 1}` : '';
        setStatus(`采集有效${label}，自动跳到下一条`);
        if (event.task && event.task !== taskSelect.value) {
          taskSelect.value = event.task;
          updateTaskName(event.task);
          await refreshMain();
        }
        await refreshRecommend(true);
        return;
      }
      if (event.status === 'rejected') {
        if (event.pending_review) {
          setPendingReview(event);
        } else {
          clearPendingReview();
        }
        const reasons = Array.isArray(event.reasons) && event.reasons.length
          ? event.reasons.map(translateVisibleText)
          : [translateVisibleText(event.message) || '采集文件未通过校验'];
        const title = event.deleted === false ? '采集未通过，文件已保留' : '采集未通过，文件已删除';
        showToast(title, reasons);
        setStatus(translateVisibleText(event.message) || '采集文件未通过校验', true);
      }
    }

    function statusFromPayload(prefix, data) {
      const now = new Date();
      const cache = data.cache || {};
      const batch = data.batch || {};
      const heights = batch.heights || {};
      const graspH = heights.grasp?.height_m;
      const placeH = heights[`${data.task}:place`]?.height_m;
      const heightText = Number.isFinite(graspH) && Number.isFinite(placeH)
        ? `；高度 抓 ${graspH.toFixed(3)}m / 放 ${placeH.toFixed(3)}m`
        : '';
      const reject = batch.reject_counts || {};
      const rejectText = `；拒绝 ${rejectLabels.overlap} ${reject.overlap || 0} ${rejectLabels.blocked} ${reject.blocked || 0} ${rejectLabels.box} ${reject.box || 0} ${rejectLabels.direction} ${reject.direction || 0} ${rejectLabels.grasp_ik} ${reject.grasp_ik || 0} ${rejectLabels.place_ik} ${reject.place_ik || 0}`;
      const pairCache = batch.cache || {};
      const cacheText = Number.isFinite(pairCache.pool_count)
        ? `；缓存 ${pairCache.pool_count}/${pairCache.target || 0}${pairCache.filling ? ' 生成中' : ''}`
        : '';
      const error = cache.error ? `；扫描警告 ${translateVisibleText(cache.error)}` : '';
      return `${prefix} ${now.toLocaleTimeString()}；${taskLabel(data.task)}；样本 ${batch.count || 0}/${batch.requested || 0}${heightText}${rejectText}${cacheText}${error}`;
    }

    async function refreshMain() {
      const seq = ++mainSeq;
      const task = taskSelect.value;
      if (mainController) mainController.abort();
      mainController = new AbortController();
      setStatus(`主屏生成中：${taskLabel(task)}，${mainCount} 条`);
      try {
        const nextPayload = await fetchPayload(task, mainCount, mainController);
        if (seq !== mainSeq) return;
        mainPayload = nextPayload;
        renderMain();
        setStatus(statusFromPayload('主屏已更新', mainPayload), Boolean(mainPayload.cache?.error));
      } catch (err) {
        if (err.name === 'AbortError') return;
        setStatus(`主屏刷新失败：${errorText(err)}`, true);
      }
    }

    async function refreshRecommend(advance = false) {
      const seq = ++recommendSeq;
      const task = taskSelect.value;
      if (recommendController) recommendController.abort();
      recommendController = new AbortController();
      setStatus(`${advance ? '下一条' : '推荐加载'}中：${taskLabel(task)}`);
      try {
        const nextPayload = await fetchRecommendation(task, advance, recommendController);
        if (seq !== recommendSeq) return;
        recommendPayload = nextPayload;
        renderRecommend();
        setStatus(statusFromPayload('推荐已更新', recommendPayload), Boolean(recommendPayload.cache?.error));
      } catch (err) {
        if (err.name === 'AbortError') return;
        setStatus(`推荐刷新失败：${errorText(err)}`, true);
      }
    }

    async function init() {
      const configRes = await fetch('/api/config');
      const config = await configRes.json();
      mainCount = Math.max(1, Number(config.sample_count) || 100);
      updateTaskName(taskSelect.value);
      if (config.recommend_live_stream_path) {
        recommendLiveBackground.onload = () => {
          recommendLiveReady = true;
          recommendLiveBackground.classList.add('ready');
          renderRecommend();
        };
        recommendLiveBackground.onerror = () => {
          recommendLiveReady = false;
          recommendLiveBackground.classList.remove('ready');
          renderRecommend();
        };
        recommendLiveBackground.src = `${config.recommend_live_stream_path}?t=${Date.now()}`;
      }
      const bgRes = await fetch('/api/background');
      const bg = await bgRes.json();
      background.onload = async () => {
        drawBackground(mainCtx);
        clearRecommendationCanvas(recommendCtx);
        await refreshMain();
        await refreshRecommend();
        await pollCollectionEvents();
        collectionPollTimer = setInterval(pollCollectionEvents, 1000);
      };
      background.src = bg.data_url;
    }

    document.getElementById('sampleBtn').onclick = () => refreshRecommend(true);
    document.getElementById('reviewDeleteBtn').onclick = () => deletePendingReviewFile();
    document.getElementById('reviewKeepBtn').onclick = () => keepPendingReviewFile();
    taskSelect.onchange = async () => {
      updateTaskName(taskSelect.value);
      await refreshMain();
      await refreshRecommend(false);
    };
    init().catch(err => setStatus(`加载失败：${errorText(err)}`, true));
  </script>
</body>
</html>
