<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>推荐采样点</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --panel: #1d2328;
      --line: #343c45;
      --text: #f4f7f8;
      --muted: #a8b3bd;
      --grasp: #2aa8ff;
      --place: #ffb23f;
      --candidate: #63e58c;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    .boards {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }
    .board {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }
    .title {
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .title strong {
      color: var(--text);
      font-size: 18px;
      line-height: 1.2;
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      align-self: center;
      border: 1px solid var(--line);
      background: #050607;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .controls {
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    select, button {
      height: 38px;
      border: 1px solid var(--line);
      background: #2a3138;
      color: var(--text);
      border-radius: 6px;
      padding: 0 12px;
      font-weight: 650;
      font-size: 14px;
    }
    button {
      background: #1766d1;
      border-color: #2f80ed;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .pill {
      color: var(--muted);
      font-size: 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      max-width: min(720px, 100%);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .legend {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    @media (max-width: 980px) {
      .boards { grid-template-columns: 1fr; }
      .title { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="boards">
      <div class="board">
        <div class="title">
          <strong>推荐采样点</strong>
          <span id="candidateMeta"></span>
        </div>
        <div class="canvas-wrap"><canvas id="candidateCanvas" width="1280" height="720"></canvas></div>
      </div>
      <div class="board">
        <div class="title">
          <strong>当前总体分布</strong>
          <span id="distributionMeta"></span>
        </div>
        <div class="canvas-wrap"><canvas id="distributionCanvas" width="1280" height="720"></canvas></div>
      </div>
    </section>
    <section class="controls">
      <select id="taskSelect" aria-label="任务">
        <option value="centrifuge">centrifuge</option>
        <option value="multidrop">multidrop</option>
      </select>
      <button id="sampleBtn">重新采样候选点</button>
      <span class="legend"><span class="dot" style="background: var(--grasp)"></span>grasp</span>
      <span class="legend"><span class="dot" style="background: var(--place)"></span>place</span>
      <span class="pill" id="status">加载中</span>
    </section>
  </main>
  <script>
    const candidateCanvas = document.getElementById('candidateCanvas');
    const distributionCanvas = document.getElementById('distributionCanvas');
    const candidateCtx = candidateCanvas.getContext('2d');
    const distributionCtx = distributionCanvas.getContext('2d');
    const candidateMeta = document.getElementById('candidateMeta');
    const distributionMeta = document.getElementById('distributionMeta');
    const statusEl = document.getElementById('status');
    const taskSelect = document.getElementById('taskSelect');
    const colors = { grasp: '#2aa8ff', place: '#ffb23f' };
    const candidateColors = { grasp: '#6ae6ff', place: '#ffe07a' };
    let background = new Image();
    let payload = null;

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? 'var(--danger)' : 'var(--muted)';
    }

    function drawBackground(ctx) {
      ctx.clearRect(0, 0, 1280, 720);
      if (background.complete) ctx.drawImage(background, 0, 0, 1280, 720);
    }

    function drawArrowHead(ctx, fromX, fromY, toX, toY, size) {
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - size * Math.cos(angle - Math.PI / 6), toY - size * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(toX - size * Math.cos(angle + Math.PI / 6), toY - size * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawPoint(ctx, point, alpha = 0.72) {
      const color = colors[point.keypose] || '#ffffff';
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(point.x, point.y, 3.2, 0, Math.PI * 2);
      ctx.fill();
      if (Number.isFinite(point.direction_u) && Number.isFinite(point.direction_v)) {
        const norm = Math.hypot(point.direction_u, point.direction_v);
        if (norm > 1e-6) {
          const scale = 24 / norm;
          const ex = point.x + point.direction_u * scale;
          const ey = point.y + point.direction_v * scale;
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(point.x, point.y);
          ctx.lineTo(ex, ey);
          ctx.stroke();
          drawArrowHead(ctx, point.x, point.y, ex, ey, 5);
        }
      }
      ctx.restore();
    }

    function drawHull(ctx, hull, color) {
      if (!hull || hull.length < 3) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.setLineDash([9, 7]);
      ctx.beginPath();
      hull.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function drawCandidate(ctx, sample) {
      if (!sample || sample.error || !sample.candidate) return;
      const c = sample.candidate;
      const color = candidateColors[sample.keypose] || '#63e58c';
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(c.x - 28, c.y);
      ctx.lineTo(c.x + 28, c.y);
      ctx.moveTo(c.x, c.y - 28);
      ctx.lineTo(c.x, c.y + 28);
      ctx.stroke();
      ctx.font = '700 24px system-ui';
      ctx.textBaseline = 'bottom';
      ctx.fillText(sample.keypose, Math.min(c.x + 18, 1190), Math.max(c.y - 14, 32));
      ctx.restore();
    }

    function drawCandidateCloud(ctx, sample) {
      if (!sample || sample.error) return;
      const color = candidateColors[sample.keypose] || '#63e58c';
      ctx.save();
      ctx.globalAlpha = 0.46;
      ctx.fillStyle = color;
      for (const item of sample.top_candidates || []) {
        ctx.beginPath();
        ctx.arc(item.x, item.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCandidateView() {
      drawBackground(candidateCtx);
      const task = payload?.task || taskSelect.value;
      const samples = payload?.samples || {};
      for (const keypose of ['grasp', 'place']) {
        const group = payload?.groups?.[`${task}:${keypose}`];
        drawHull(candidateCtx, group?.hull, keypose === 'grasp' ? 'rgba(42,168,255,0.72)' : 'rgba(255,178,63,0.72)');
        drawCandidateCloud(candidateCtx, samples[keypose]);
      }
      drawCandidate(candidateCtx, samples.grasp);
      drawCandidate(candidateCtx, samples.place);

      const labels = [];
      for (const keypose of ['grasp', 'place']) {
        const item = samples[keypose];
        if (item && !item.error && item.candidate) labels.push(`${keypose} ${item.candidate.score.toFixed(1)}px`);
        else labels.push(`${keypose} 无候选`);
      }
      candidateMeta.textContent = labels.join(' / ');
    }

    function drawDistributionView() {
      drawBackground(distributionCtx);
      const task = payload?.task || taskSelect.value;
      const points = payload?.points || [];
      let count = 0;
      let grasp = 0;
      let place = 0;
      for (const point of points) {
        if (point.task !== task) continue;
        drawPoint(distributionCtx, point);
        count++;
        if (point.keypose === 'grasp') grasp++;
        if (point.keypose === 'place') place++;
      }
      distributionMeta.textContent = `${task}: ${count} 点，grasp ${grasp}，place ${place}`;
    }

    function render() {
      if (!payload) return;
      drawCandidateView();
      drawDistributionView();
    }

    async function refresh() {
      try {
        const params = new URLSearchParams({ task: taskSelect.value, t: Date.now().toString() });
        const res = await fetch(`/api/data?${params.toString()}`);
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        payload = await res.json();
        render();
        const now = new Date();
        const cache = payload.cache || {};
        const error = cache.error ? `；扫描警告 ${cache.error}` : '';
        setStatus(`已更新 ${now.toLocaleTimeString()}；缓存 ${cache.files || 0} 文件，${cache.points || 0} 点${error}`, Boolean(cache.error));
      } catch (err) {
        setStatus(`刷新失败：${err}`, true);
      }
    }

    async function init() {
      const bgRes = await fetch('/api/background');
      const bg = await bgRes.json();
      background.onload = async () => {
        await refresh();
        setInterval(refresh, 10000);
      };
      background.src = bg.data_url;
    }

    document.getElementById('sampleBtn').onclick = refresh;
    taskSelect.onchange = refresh;
    init().catch(err => setStatus(`加载失败：${err}`, true));
  </script>
</body>
</html>
